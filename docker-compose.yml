version: '3'

networks:
  omer-evo-net:
    driver: bridge

services:

  # ── PostgreSQL — required by Evolution API v2 ────────────────────────────────
  omer-evo-postgres:
    image: postgres:15-alpine
    container_name: omer-evo-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evo-pg-pass
    volumes:
      - /volume2/docker/sefirat-evolution/postgres-data:/var/lib/postgresql/data
    networks:
      - omer-evo-net

  # ── Evolution API ────────────────────────────────────────────────────────────
  # Admin dashboard: http://<NAS-IP>:8084
  omer-evolution-api:
    image: atendai/evolution-api:latest
    container_name: omer-evolution-api
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      - SERVER_URL=http://omer-evolution-api:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=omer-evo-secret-key
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - CONFIG_SESSION_PHONE_CLIENT=Sefirat HaOmer Bot
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30
      - WEBHOOK_GLOBAL_ENABLED=false
      - DEL_INSTANCE=false
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evo-pg-pass@omer-evo-postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
    volumes:
      - /volume2/docker/sefirat-evolution/evolution-data:/evolution/instances
    networks:
      - omer-evo-net
    depends_on:
      - omer-evo-postgres

  # ── Sefirat HaOmer bot (Evolution edition) ───────────────────────────────────
  # Port 5052 — does NOT conflict with existing bot on 5051.
  sefirat-evo-bot:
    image: sefirat-evo-bot:latest
    container_name: sefirat-evo-bot
    restart: unless-stopped
    ports:
      - "5052:3500"
    environment:
      - TIME_TO_SEND=20:30
      - TIMEZONE=Europe/Berlin
      - EVOLUTION_URL=http://omer-evolution-api:8080
      - EVOLUTION_API_KEY=omer-evo-secret-key
      - EVOLUTION_INSTANCE=sefirat-omer
      - CONTACTS_FILE=/data/contacts.json
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /volume2/docker/birthday-bot/data:/data
    networks:
      - omer-evo-net
    depends_on:
      - omer-evolution-api
